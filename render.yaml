services:
  # Backend API Service
  - type: web
    name: talk-to-krishna-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python -m src.create_embeddings"
    startCommand: "gunicorn website.api_server:app --workers 1 --threads 4 --timeout 180 --preload"
    disk:
      name: data-disk
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FRONTEND_URL
        value: "https://talk-to-krishna-japan.vercel.app,https://japan.talktokrishna.ai,http://localhost:3000"
